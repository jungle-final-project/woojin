services:
  postgres:
    build:
      context: ./infra/docker/postgres
    image: buildgraph-postgres
    container_name: buildgraph-postgres
    environment:
      POSTGRES_DB: buildgraph
      POSTGRES_USER: buildgraph
      POSTGRES_PASSWORD: buildgraph
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildgraph -d buildgraph"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: buildgraph-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: buildgraph-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: buildgraph
      RABBITMQ_DEFAULT_PASS: buildgraph
    ports:
      - "5672:5672"
      - "15672:15672"

  mailpit:
    image: axllent/mailpit:latest
    container_name: buildgraph-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: ./apps/api
    container_name: buildgraph-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/buildgraph
      SPRING_DATASOURCE_USERNAME: buildgraph
      SPRING_DATASOURCE_PASSWORD: buildgraph
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: buildgraph
      SPRING_RABBITMQ_PASSWORD: buildgraph
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      AGENT_RUNNER_MODE: ${AGENT_RUNNER_MODE:-deterministic}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      NAVER_SEARCH_CLIENT_ID: ${NAVER_SEARCH_CLIENT_ID:-}
      NAVER_SEARCH_CLIENT_SECRET: ${NAVER_SEARCH_CLIENT_SECRET:-}
      NAVER_SEARCH_BASE_URL: ${NAVER_SEARCH_BASE_URL:-https://openapi.naver.com}
      PART_PRICE_REFRESH_ENABLED: ${PART_PRICE_REFRESH_ENABLED:-true}
      PART_PRICE_REFRESH_CRON: "${PART_PRICE_REFRESH_CRON:-0 0 4 * * *}"
      PART_PRICE_REFRESH_ZONE: ${PART_PRICE_REFRESH_ZONE:-Asia/Seoul}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    ports:
      - "8080:8080"

  web:
    build:
      context: ./apps/web
    container_name: buildgraph-web
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  postgres-data:
